name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Allowed tools for this Python/Flask project (nox test runner, flake8/black/isort lint)
          claude_args: |
            --allowedTools "Bash(nox:*),Bash(venv/bin/nox:*),Bash(python:*),Bash(python3:*),Bash(pip:*),Bash(pip3:*),Bash(python3 -m venv:*),Bash(source:*),Bash(venv/bin/python:*),Bash(venv/bin/pip:*),Bash(venv/bin/python -m pytest:*),Bash(flake8:*),Bash(black:*),Bash(isort:*),Bash(flask db:*),Bash(FLASK_APP=* flask db:*),Bash(DATABASE_URL=* flask db:*),Bash(git:*),Bash(gh:*),Bash(ls:*),Bash(find:*),Bash(grep:*),Bash(wc:*),Bash(test:*),Bash(cat:*),Bash(head:*),Bash(tail:*),WebSearch,WebFetch(domain:flask.palletsprojects.com),WebFetch(domain:werkzeug.palletsprojects.com),WebFetch(domain:flask-wtf.readthedocs.io),WebFetch(domain:docs.sqlalchemy.org),WebFetch(domain:docs.python.org),WebFetch(domain:github.com)"
